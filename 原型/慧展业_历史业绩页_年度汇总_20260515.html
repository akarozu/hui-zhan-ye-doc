<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#003B99","primary-container": "#1A52BF","surface": "#F7F9FC",
            "surface-container-low": "#F2F4F7","surface-container": "#ECEEF1",
            "surface-container-high": "#E6E8EB","surface-container-highest": "#E0E3E6",
            "surface-container-lowest": "#FFFFFF","on-surface": "#191C1E",
            "on-surface-variant": "#434653","outline-variant": "#C3C6D5","outline": "#737685",
            "tertiary": "#732B00","tertiary-container": "#993C00","tertiary-fixed": "#FFDBCC",
            "secondary": "#4E5D88","secondary-container": "#BFCEFF","error": "#BA1A1A",
            "error-container": "#FFDAD6","on-primary": "#FFFFFF","on-tertiary": "#FFFFFF",
            "on-tertiary-fixed": "#351000","on-error": "#FFFFFF","on-error-container": "#93000A",
            "on-secondary-container": "#485781",
          },
          borderRadius: { "DEFAULT": "0.25rem","lg": "1rem","xl": "1.5rem","full": "9999px" },
          fontFamily: { "headline": ["Manrope"],"body": ["Inter"],"label": ["Inter"] }
        }
      }
    }
  </script>
  <style>
    :root {
      --motion-duration-short: 100ms;
      --motion-duration-medium: 200ms;
      --motion-duration-long: 350ms;
      --motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-decelerated: cubic-bezier(0, 0, 0, 1);
      --motion-easing-accelerated: cubic-bezier(0.3, 0, 1, 1);
    }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    .tab-active { background: #003B99; color: #fff; }
    .tab-inactive { background: #ECEEF1; color: #434653; }

    /* ========== Fallback CSS ========== */
    body { background: #F7F9FC; color: #191C1E; margin: 0; }
    .bg-surface { background: #F7F9FC; }
    .bg-surface-container-lowest { background: white; }
    .bg-surface-container-low { background: #F2F4F7; }
    .bg-surface-container { background: #ECEEF1; }
    .bg-surface-container-high { background: #E6E8EB; }
    .bg-surface-container-highest { background: #E0E3E6; }
    .bg-primary { background: #003B99; }
    .bg-primary-container { background: #1A52BF; }
    .bg-white { background: white; }
    .text-on-surface { color: #191C1E; }
    .text-on-surface-variant { color: #434653; }
    .text-white { color: white; }
    .text-primary { color: #003B99; }
    .text-green-300 { color: #86efac; }
    .text-green-600 { color: #16a34a; }
    .text-red-500 { color: #ef4444; }
    .text-error { color: #BA1A1A; }
    .rounded-2xl { border-radius: 1rem; }
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-full { border-radius: 9999px; }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .fixed { position: fixed; }
    .absolute { position: absolute; }
    .relative { position: relative; }
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    .left-0 { left: 0; }
    .right-0 { right: 0; }
    .z-50 { z-index: 50; }
    .w-full { width: 100%; }
    .w-9 { width: 2.25rem; }
    .max-w-lg { max-width: 32rem; margin-left: auto; margin-right: auto; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-1 { flex: 1 1 0%; }
    .flex-shrink-0 { flex-shrink: 0; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .items-end { align-items: flex-end; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .justify-around { justify-content: space-around; }
    .gap-1 { gap: 0.25rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-4 { gap: 1rem; }
    .p-3 { padding: 0.75rem; }
    .p-4 { padding: 1rem; }
    .p-5 { padding: 1.25rem; }
    .p-2\.5 { padding: 0.625rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .pb-8 { padding-bottom: 2rem; }
    .pt-16 { padding-top: 4rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mt-0\.5 { margin-top: 0.125rem; }
    .mt-1 { margin-top: 0.25rem; }
    .space-y-2 > * + * { margin-top: 0.5rem; }
    .space-y-3 > * + * { margin-top: 0.75rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .text-xs { font-size: 0.75rem; line-height: 1rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .text-base { font-size: 1rem; line-height: 1.5rem; }
    .text-lg { font-size: 1.125rem; line-height: 1.75rem;; }
    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    .font-headline { font-family: 'Manrope', sans-serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .font-medium { font-weight: 500; }
    .uppercase { text-transform: uppercase; }
    .tracking-wider { letter-spacing: 0.025em; }
    .tracking-widest { letter-spacing: 0.1em; }
    .leading-tight { line-height: 1.25; }
    .leading-none { line-height: 1; }
    .leading-relaxed { line-height: 1.625; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }
    .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); }
    .cursor-pointer { cursor: pointer; }
    .antialiased { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .opacity-80 { opacity: 0.8; }
    .opacity-70 { opacity: 0.7; }
    .opacity-60 { opacity: 0.6; }
    .transition-all { transition: all 150ms cubic-bezier(0.2, 0, 0, 1); }
    .transition-colors { transition: color 150ms, background-color 150ms, border-color 150ms; }
    .duration-200 { transition-duration: 200ms; }
    .active\:scale-95:active { transform: scale(0.95); }
    .hover\:shadow-md:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
    .hover\:underline:hover { text-decoration: underline; }
    .backdrop-blur-xl { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .bg-white\/80 { background: rgba(255,255,255,0.8); }
    .bg-white\/90 { background: rgba(255,255,255,0.9); }
    .bg-white\/15 { background: rgba(255,255,255,0.15); }
    .bg-white\/10 { background: rgba(255,255,255,0.1); }
    .bg-white\/20 { background: rgba(255,255,255,0.2); }
    .bg-primary\/10 { background: rgba(0,59,153,0.1); }
    .grid { display: grid; }
    .grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
    .border-b { border-bottom-width: 1px; border-bottom-style: solid; }
    .border-t { border-top-width: 1px; border-top-style: solid; }
    .border-outline-variant { border-color: #C3C6D5; }
    .divide-y > * + * { border-top-width: 1px; border-top-style: solid; border-top-color: #E6E8EB; }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-sm h-16 flex justify-between items-center px-6">
    <div class="flex items-center gap-3">
      <button class="w-9 h-9 rounded-xl bg-primary-container flex items-center justify-center cursor-pointer transition-all active:scale-95" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="font-headline font-semibold text-base text-on-surface">历史业绩</span>
    </div>
    <button class="p-2 rounded-xl hover:bg-surface-container transition-colors active:scale-95 cursor-pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="#434653" stroke-width="2"/>
        <line x1="16" y1="2" x2="16" y2="6" stroke="#434653" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="2" x2="8" y2="6" stroke="#434653" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="21" y2="10" stroke="#434653" stroke-width="2"/>
      </svg>
    </button>
  </header>

  <main class="pt-16 pb-8 px-5 max-w-lg mx-auto space-y-4">

    <!-- ========== 年度汇总区 ========== -->
    <section id="summary-section">

      <!-- 口径切换 Tab -->
      <div class="flex items-center gap-2 mb-3">
        <button id="tab-annual" onclick="switchTab('annual')"
          class="tab-active px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer">
          本年度
        </button>
        <button id="tab-total" onclick="switchTab('total')"
          class="tab-inactive px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer">
          历史汇总
        </button>
      </div>

      <!-- 汇总主卡：Executive Dashboard 风格 -->
      <div class="bg-white rounded-2xl shadow-sm border border-outline-variant overflow-hidden">

        <!-- 表头 -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant bg-surface-container-low">
          <span class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">业绩概览</span>
          <span class="text-[10px] text-on-surface-variant/60" id="update-time">更新于 05-15 10:30</span>
        </div>

        <!-- 四大指标行 -->
        <div id="kpi-row" class="grid grid-cols-4 divide-x divide-outline-variant">
          <!-- 动态渲染 -->
        </div>

        <!-- 资产总计 -->
        <div id="aum-row" class="border-t border-outline-variant">
          <!-- 动态渲染 -->
        </div>

      </div>

    </section>

    <!-- ========== 月度列表 ========== -->
    <section class="space-y-3">
      <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">近12个月明细</p>

      <!-- 月度列表（紧凑表格行） -->
      <div id="month-list" class="bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-outline-variant">
        <!-- 动态渲染 -->
      </div>

      <!-- 展开更多 -->
      <div id="expand-btn" class="text-center py-3">
        <button onclick="toggleExpand()" class="text-xs text-primary font-semibold hover:underline active:scale-95 transition-all cursor-pointer">
          展开全部月份
        </button>
      </div>
    </section>

  </main>

  <script>
    // ========== 数据定义 ==========
    const summaryData = {
      annual: {
        newMerchants: 128,
        newMerchantsTrend: '+12%',
        qualified: 96,
        qualifiedTrend: '+8%',
        active: 82,
        activeTrend: '+5%',
        income: 28.56,
        incomeUnit: '万',
        incomeTrend: '+15%',
        aum: 856.42,
        aumUnit: '万',
        aumTrend: '+3%'
      },
      total: {
        newMerchants: 342,
        newMerchantsTrend: '+26%',
        qualified: 248,
        qualifiedTrend: '+20%',
        active: 201,
        activeTrend: '+18%',
        income: 1.24,
        incomeUnit: '亿',
        incomeTrend: '+22%',
        aum: 2156.80,
        aumUnit: '万',
        aumTrend: '+5%'
      }
    };

    const monthlyData = [
      { month: '2026年3月', current: true, newMerchants: 42, newTrend: '+15%', qualified: 33, qualTrend: '+10%', active: 41, actTrend: '+5%', income: 125, incTrend: '+12%' },
      { month: '2026年2月', current: false, newMerchants: 38, newTrend: '-12%', qualified: 30, qualTrend: '-12%', active: 39, actTrend: '-5%', income: 108, incTrend: '-3%' },
      { month: '2026年1月', current: false, newMerchants: 43, newTrend: '+16%', qualified: 34, qualTrend: '+26%', active: 41, actTrend: '+8%', income: 112, incTrend: '+8%' },
      { month: '2025年12月', current: false, newMerchants: 37, newTrend: '+6%', qualified: 27, qualTrend: '+4%', active: 38, actTrend: '+0%', income: 104, incTrend: '+11%' },
      { month: '2025年11月', current: false, newMerchants: 35, newTrend: '+3%', qualified: 26, qualTrend: '+8%', active: 38, actTrend: '+3%', income: 94, incTrend: '+5%' },
      { month: '2025年10月', current: false, newMerchants: 34, newTrend: '-5%', qualified: 24, qualTrend: '-4%', active: 37, actTrend: '-2%', income: 89, incTrend: '-6%' },
      { month: '2025年9月', current: false, newMerchants: 36, newTrend: '+9%', qualified: 25, qualTrend: '+14%', active: 38, actTrend: '+6%', income: 95, incTrend: '+9%' },
      { month: '2025年8月', current: false, newMerchants: 33, newTrend: '+10%', qualified: 22, qualTrend: '+5%', active: 36, actTrend: '+3%', income: 87, incTrend: '+7%' },
      { month: '2025年7月', current: false, newMerchants: 30, newTrend: '-7%', qualified: 21, qualTrend: '-9%', active: 35, actTrend: '-4%', income: 81, incTrend: '-8%' },
      { month: '2025年6月', current: false, newMerchants: 32, newTrend: '+6%', qualified: 23, qualTrend: '+10%', active: 36, actTrend: '+5%', income: 88, incTrend: '+6%' },
      { month: '2025年5月', current: false, newMerchants: 30, newTrend: '+0%', qualified: 21, qualTrend: '+0%', active: 34, actTrend: '+0%', income: 83, incTrend: '+3%' },
      { month: '2025年4月', current: false, newMerchants: 30, newTrend: '+4%', qualified: 21, qualTrend: '+5%', income: 80, incTrend: '+5%', active: 34, actTrend: '+3%' },
    ];

    let currentTab = 'annual';
    let expanded = false;

    // ========== 渲染函数 ==========
    function trendClass(val) {
      if (val.startsWith('+')) return 'text-green-600';
      if (val.startsWith('-')) return 'text-red-500';
      return 'text-on-surface-variant';
    }

    function trendIcon(val) {
      if (val.startsWith('+')) {
        return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" class="inline-block mr-0.5"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      if (val.startsWith('-')) {
        return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" class="inline-block mr-0.5"><path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      return '';
    }

    function formatMoney(val, unit) {
      if (unit === '亿') return '¥' + val.toFixed(1) + '亿';
      if (unit === '万') return '¥' + val.toFixed(1) + '万';
      return '¥' + val + '元';
    }

    function renderKPIRow(period) {
      const d = summaryData[period];
      const kpi = document.getElementById('kpi-row');
      kpi.innerHTML = [
        { label: '入网', value: d.newMerchants, unit: '户', trend: d.newMerchantsTrend },
        { label: '达标', value: d.qualified, unit: '户', trend: d.qualifiedTrend },
        { label: '有效', value: d.active, unit: '户', trend: d.activeTrend },
        { label: '收入', value: formatMoney(d.income, d.incomeUnit), trend: d.incomeTrend },
      ].map(item => `
        <div class="flex-1 py-4 px-3 text-center cursor-pointer hover:bg-surface-container-low transition-colors">
          <p class="text-[10px] text-on-surface-variant font-semibold uppercase tracking-wider mb-1">${item.label}</p>
          <p class="font-headline text-lg font-bold text-on-surface leading-tight mb-1">${item.value}</p>
          <p class="text-[10px] font-medium ${trendClass(item.trend)} leading-none">${trendIcon(item.trend)}${item.trend}</p>
        </div>
      `).join('');
    }

    function renderAUMRow(period) {
      const d = summaryData[period];
      const aumRow = document.getElementById('aum-row');
      const aumVal = formatMoney(d.aum, d.aumUnit);
      aumRow.innerHTML = `
        <div class="flex items-center justify-between px-4 py-3 bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors">
          <div class="flex items-center gap-2">
            <span class="text-xs text-on-surface-variant font-semibold">资产总计</span>
            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-primary/10 text-primary">P2</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="font-headline text-base font-bold text-primary">¥${aumVal}</span>
            <span class="text-xs font-medium ${trendClass(d.aumTrend)}">${trendIcon(d.aumTrend)}${d.aumTrend}</span>
          </div>
        </div>
      `;
    }

    function renderMonthList() {
      const list = document.getElementById('month-list');
      const displayData = expanded ? monthlyData : monthlyData.slice(0, 5);

      list.innerHTML = displayData.map(item => `
        <div class="px-4 py-3 cursor-pointer hover:bg-surface-container-low transition-colors ${item.current ? 'bg-primary/5' : ''}">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="font-headline text-sm font-semibold text-on-surface">${item.month}</span>
              ${item.current ? '<span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full bg-primary/10 text-primary">当前</span>' : ''}
            </div>
          </div>
          <!-- 指标行 -->
          <div class="grid grid-cols-4 gap-2">
            <div>
              <p class="text-[9px] text-on-surface-variant font-medium mb-0.5">入网</p>
              <div class="flex items-end gap-1">
                <span class="font-headline text-sm font-bold text-on-surface">${item.newMerchants}</span>
                <span class="text-[9px] font-medium ${trendClass(item.newTrend)}">${trendIcon(item.newTrend)}${item.newTrend}</span>
              </div>
            </div>
            <div>
              <p class="text-[9px] text-on-surface-variant font-medium mb-0.5">达标</p>
              <div class="flex items-end gap-1">
                <span class="font-headline text-sm font-bold text-on-surface">${item.qualified}</span>
                <span class="text-[9px] font-medium ${trendClass(item.qualTrend)}">${trendIcon(item.qualTrend)}${item.qualTrend}</span>
              </div>
            </div>
            <div>
              <p class="text-[9px] text-on-surface-variant font-medium mb-0.5">有效</p>
              <div class="flex items-end gap-1">
                <span class="font-headline text-sm font-bold text-on-surface">${item.active}</span>
                <span class="text-[9px] font-medium ${trendClass(item.actTrend)}">${trendIcon(item.actTrend)}${item.actTrend}</span>
              </div>
            </div>
            <div>
              <p class="text-[9px] text-on-surface-variant font-medium mb-0.5">收入</p>
              <div class="flex items-end gap-1">
                <span class="font-headline text-sm font-bold text-on-surface">¥${item.income}</span>
                <span class="text-[9px] font-medium ${trendClass(item.incTrend)}">${trendIcon(item.incTrend)}${item.incTrend}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      // 更新展开按钮
      const expandBtn = document.querySelector('#expand-btn button');
      if (expanded) {
        expandBtn.textContent = '收起月份';
      } else {
        expandBtn.textContent = '展开全部月份';
      }
    }

    function toggleExpand() {
      expanded = !expanded;
      renderMonthList();
    }

    function switchTab(tab) {
      const tabAnnual = document.getElementById('tab-annual');
      const tabTotal = document.getElementById('tab-total');

      if (tab === 'annual') {
        tabAnnual.className = 'tab-active px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer';
        tabTotal.className = 'tab-inactive px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer';
      } else {
        tabTotal.className = 'tab-active px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer';
        tabAnnual.className = 'tab-inactive px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-200 cursor-pointer';
      }

      currentTab = tab;
      renderKPIRow(tab);
      renderAUMRow(tab);
    }

    // ========== 初始化 ==========
    renderKPIRow('annual');
    renderAUMRow('annual');
    renderMonthList();
  </script>

</body>
</html>
