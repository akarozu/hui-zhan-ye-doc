<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>管户客户查询</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2563EB', dark: '#1D4ED8', light: '#3B82F6' },
            accent: '#10B981',
            'accent-bg': '#dcfce7',
            warning: '#F59E0B',
            'warning-bg': '#fef3c7',
            error: '#EF4444',
            'error-bg': '#fee2e2',
            surface: '#FFFFFF',
            'surface-bg': '#F8FAFC',
            muted: '#64748B',
            border: '#E2E8F0',
            navy: '#0F172A',
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'Noto Sans SC', 'sans-serif'],
            mono: ['D-DIN-PRO', 'IBM Plex Mono', 'monospace'],
          },
          borderRadius: {
            card: '16px',
            pill: '999px',
          },
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'IBM Plex Sans', 'Noto Sans SC', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .font-din { font-family: 'D-DIN-PRO', 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

    /* Sort chip */
    .sort-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      border: 1px solid #E2E8F0;
      background: #FFFFFF;
      color: #64748B;
      cursor: pointer;
      transition: all 150ms cubic-bezier(0.2,0,0,1);
      white-space: nowrap;
      user-select: none;
    }
    .sort-chip:hover { background: #F1F5F9; }
    .sort-chip.active {
      background: #2563EB;
      color: white;
      border-color: #2563EB;
    }
    .sort-chip .arrow { font-size: 11px; transition: transform 150ms; }
    .sort-chip.active.asc .arrow { transform: rotate(180deg); }
    .sort-chip.active.desc .arrow { transform: rotate(0deg); }

    /* Priority left-border cards */
    .customer-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4rpx 16rpx rgba(0,0,0,0.08);
      padding: 16px;
      transition: transform 150ms cubic-bezier(0.2,0,0,1);
    }
    .customer-card:active { transform: scale(0.98); }
    .priority-urgent { border-left: 3px solid #EF4444; }
    .priority-high { border-left: 3px solid #F59E0B; }
    .priority-normal { border-left: 3px solid #E2E8F0; }

    /* Tag */
    .tag { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; }
    .tag-red { background: #fee2e2; color: #EF4444; }
    .tag-orange { background: #fef3c7; color: #D97706; }
    .tag-green { background: #dcfce7; color: #10B981; }
    .tag-blue { background: #dbeafe; color: #2563EB; }
    .tag-gray { background: #f1f5f9; color: #64748B; }

    /* Skeleton */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    /* Filter modal */
    .filter-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms cubic-bezier(0.2,0,0,1);
    }
    .filter-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .filter-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white;
      border-radius: 20px 20px 0 0;
      z-index: 101;
      transform: translateY(100%);
      transition: transform 300ms cubic-bezier(0.2,0,0,1);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .filter-sheet.show { transform: translateY(0); }
    .filter-handle {
      width: 36px; height: 4px;
      background: #E2E8F0;
      border-radius: 999px;
      margin: 12px auto 0;
    }

    /* Active filter tags */
    .active-filter-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      background: #dbeafe; color: #2563EB;
      border-radius: 999px;
      font-size: 12px; font-weight: 500;
    }
    .active-filter-tag .close-btn {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2563EB; color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; cursor: pointer;
    }

    /* Search bar */
    .search-bar {
      width: 100%; height: 40px;
      border-radius: 999px;
      border: 1px solid #E2E8F0;
      background: #F8FAFC;
      padding: 0 16px 0 40px;
      font-size: 14px;
      color: #0F172A;
      outline: none;
      transition: border-color 150ms;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .search-bar:focus { border-color: #2563EB; }
    .search-bar::placeholder { color: #94A3B8; }
  </style>
</head>
<body class="bg-surface-bg text-navy min-h-screen max-w-md mx-auto relative overflow-hidden">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-xl shadow-sm h-16 flex justify-between items-center px-5">
    <span class="font-bold text-base text-navy">管户客户</span>
  </header>

  <!-- Main Content -->
  <main class="pt-16 pb-28 px-5 max-w-lg mx-auto">

    <!-- Search Bar -->
    <div class="relative mt-4 mb-4">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-muted" style="font-size:18px">search</span>
      <input type="text" id="searchInput" class="search-bar" placeholder="搜索客户姓名 / 手机号" oninput="onSearch(this.value)"/>
    </div>

    <!-- Sort Chips Row -->
    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 -mx-5 px-5">
      <button id="sortType" class="sort-chip" onclick="toggleSort('type', this)">
        客户类型 <span class="arrow">▲</span>
      </button>
      <button id="sortAUM" class="sort-chip" onclick="toggleSort('aum', this)">
        AUM <span class="arrow">▲</span>
      </button>
      <button id="sortRisk" class="sort-chip" onclick="toggleSort('risk', this)">
        风险等级 <span class="arrow">▲</span>
      </button>
      <button onclick="toggleFilterModal()" class="ml-auto flex-shrink-0 w-9 h-9 rounded-full bg-surface-bg flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-muted" style="font-size:20px">tune</span>
      </button>
    </div>

    <!-- Active Filter Tags -->
    <div id="activeFilterTags" class="flex flex-wrap gap-1.5 mb-3 mt-1"></div>

    <!-- Client List -->
    <div id="customerList" class="space-y-3"></div>

    <!-- Loading Skeleton -->
    <div id="loadingSkeleton" class="hidden space-y-3 mt-3">
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-24 rounded"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton h-3 w-16 rounded"></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-24 rounded"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton h-3 w-16 rounded"></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-24 rounded"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton h-3 w-16 rounded"></div>
        </div>
      </div>
    </div>

    <!-- Load More Hint -->
    <div id="loadMoreHint" class="text-center py-6 text-sm text-muted">
      <span id="loadHintText">上滑加载更多</span>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16">
      <div class="w-20 h-20 rounded-full bg-surface-bg flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-muted" style="font-size:40px">person_search</span>
      </div>
      <p class="font-bold text-navy mb-1">暂无符合条件的客户</p>
      <p class="text-sm text-muted">调整筛选条件后重试</p>
    </div>
  </main>

  <!-- Filter Modal Overlay -->
  <div id="filterOverlay" class="filter-overlay" onclick="closeFilterModal()"></div>

  <!-- Filter Sheet -->
  <div id="filterSheet" class="filter-sheet" style="max-width: 512px; margin: 0 auto;">
    <div class="filter-handle"></div>
    <div class="flex items-center justify-between px-5 py-3 border-b border-[#E2E8F0]">
      <span class="font-bold text-base text-navy">筛选</span>
      <button onclick="closeFilterModal()" class="w-8 h-8 rounded-full bg-surface-bg flex items-center justify-center cursor-pointer">
        <span class="material-symbols-outlined text-muted" style="font-size:18px">close</span>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto px-5 py-4 space-y-5" style="padding-bottom: env(safe-area-inset-bottom, 16px);">

      <!-- 产品类型 -->
      <div>
        <div class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">产品类型</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'type', '基金客户')">基金客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'type', '理财客户')">理财客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'type', '存款客户')">存款客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'type', '混合客户')">混合客户</button>
        </div>
      </div>

      <!-- 风险等级 -->
      <div>
        <div class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">风险等级</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'risk', '保守型')">保守型</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'type', '稳健型')">稳健型</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'risk', '平衡型')">平衡型</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'risk', '成长型')">成长型</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'risk', '进取型')">进取型</button>
        </div>
      </div>

      <!-- 客户分类 -->
      <div>
        <div class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">客户分类</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'category', '潜在客户')">潜在客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'category', '潜力客户')">潜力客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'category', '核心客户')">核心客户</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'category', '休眠客户')">休眠客户</button>
        </div>
      </div>

      <!-- 资产区间 -->
      <div>
        <div class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">资产区间</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'asset', '<10万')">&lt;10万</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'asset', '10-50万')">10-50万</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'asset', '50-100万')">50-100万</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'asset', '100-500万')">100-500万</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'asset', '>500万')">&gt;500万</button>
        </div>
      </div>

      <!-- 活跃时间 -->
      <div>
        <div class="text-xs font-semibold text-muted uppercase tracking-wider mb-2">活跃时间</div>
        <div class="flex flex-wrap gap-2">
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'active', '近7天')">近7天</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'active', '近30天')">近30天</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'active', '近90天')">近90天</button>
          <button class="filter-check-btn px-4 py-2 rounded-full border border-[#E2E8F0] text-sm text-navy bg-white cursor-pointer transition-all active:scale-[0.97]" onclick="toggleFilterCheck(this, 'active', '90天以上')">90天以上</button>
        </div>
      </div>

    </div>

    <!-- Filter Sheet Footer -->
    <div class="px-5 py-4 border-t border-[#E2E8F0] flex gap-3 flex-shrink-0" style="padding-bottom: env(safe-area-inset-bottom, 16px);">
      <button onclick="resetFilters()" class="flex-1 h-11 rounded-full border border-[#E2E8F0] text-sm font-medium text-navy cursor-pointer active:scale-[0.97] transition-transform bg-white">重置</button>
      <button onclick="applyFilters()" class="flex-1 h-11 rounded-full bg-primary text-white text-sm font-semibold cursor-pointer active:scale-[0.97] transition-transform">应用筛选</button>
    </div>
  </div>

  <script>
    // ========== Mock Data ==========
    const allCustomers = [
      { id: 'C001', name: '张伟',  phone: '138****8888', type: '基金客户', aum: 50.2,  activeDays: 3,  risk: '平衡型', category: '潜力客户', priority: 'high' },
      { id: 'C002', name: '李娜',  phone: '139****9999', type: '理财客户', aum: 120.5, activeDays: 15, risk: '稳健型', category: '核心客户', priority: 'normal' },
      { id: 'C003', name: '王芳',  phone: '136****1234', type: '混合客户', aum: 85.0,  activeDays: 7,  risk: '成长型', category: '潜力客户', priority: 'high' },
      { id: 'C004', name: '刘洋',  phone: '137****5678', type: '存款客户', aum: 8.5,   activeDays: 45, risk: '保守型', category: '潜在客户', priority: 'normal' },
      { id: 'C005', name: '陈静',  phone: '135****2345', type: '基金客户', aum: 200.0, activeDays: 1,  risk: '进取型', category: '核心客户', priority: 'urgent' },
      { id: 'C006', name: '赵强',  phone: '158****6789', type: '理财客户', aum: 55.8,  activeDays: 22, risk: '平衡型', category: '潜力客户', priority: 'normal' },
      { id: 'C007', name: '孙丽',  phone: '159****3456', type: '混合客户', aum: 150.0, activeDays: 5,  risk: '稳健型', category: '核心客户', priority: 'urgent' },
      { id: 'C008', name: '周涛',  phone: '186****7890', type: '基金客户', aum: 32.0,  activeDays: 60, risk: '平衡型', category: '休眠客户', priority: 'normal' },
      { id: 'C009', name: '吴婷',  phone: '187****0123', type: '理财客户', aum: 88.0,  activeDays: 10, risk: '成长型', category: '潜力客户', priority: 'high' },
      { id: 'C010', name: '郑明',  phone: '188****4567', type: '存款客户', aum: 12.0,  activeDays: 95, risk: '保守型', category: '潜在客户', priority: 'normal' },
      { id: 'C011', name: '黄磊',  phone: '189****8901', type: '基金客户', aum: 180.0, activeDays: 2,  risk: '进取型', category: '核心客户', priority: 'urgent' },
      { id: 'C012', name: '杨雪',  phone: '135****5678', type: '混合客户', aum: 65.0,  activeDays: 18, risk: '稳健型', category: '潜力客户', priority: 'normal' },
      { id: 'C013', name: '周勇',  phone: '136****9012', type: '理财客户', aum: 42.0,  activeDays: 30, risk: '平衡型', category: '潜力客户', priority: 'normal' },
      { id: 'C014', name: '吴娟',  phone: '137****3456', type: '基金客户', aum: 95.0,  activeDays: 8,  risk: '成长型', category: '核心客户', priority: 'high' },
      { id: 'C015', name: '徐鹏',  phone: '138****7890', type: '存款客户', aum: 6.0,   activeDays: 120, risk: '保守型', category: '休眠客户', priority: 'normal' },
    ];

    // ========== State ==========
    let displayed = [...allCustomers];
    let sortKey = '';
    let sortDir = 'asc'; // 'asc' | 'desc'
    let filters = { type: [], risk: [], category: [], asset: [], active: [] };
    let searchKeyword = '';
    let pageSize = 5;
    let displayedCount = 0;
    let isLoading = false;

    // ========== Sort ==========
    function toggleSort(key, btn) {
      // Remove active from all chips
      document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active', 'asc', 'desc'));
      if (sortKey === key) {
        // Toggle direction
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = 'asc';
      }
      btn.classList.add('active', sortDir);
      refreshList();
    }

    function onSearch(val) {
      searchKeyword = val.trim().toLowerCase();
      refreshList();
    }

    function refreshList() {
      // Build the filtered + sorted dataset, then render from scratch
      let result = [...allCustomers];
      if (searchKeyword) result = filterBySearch(result);
      // Apply filters
      if (filters.type.length) result = result.filter(c => filters.type.includes(c.type));
      if (filters.risk.length) result = result.filter(c => filters.risk.includes(c.risk));
      if (filters.category.length) result = result.filter(c => filters.category.includes(c.category));
      if (filters.active.length) {
        result = result.filter(c => {
          return filters.active.some(f => {
            const map = { '近7天': 7, '近30天': 30, '近90天': 90, '90天以上': 91 };
            const threshold = map[f];
            if (f === '90天以上') return c.activeDays > threshold;
            return c.activeDays <= threshold;
          });
        });
      }
      if (filters.asset.length) {
        result = result.filter(c => {
          return filters.asset.some(f => {
            const ranges = { '<10万': [0, 10], '10-50万': [10, 50], '50-100万': [50, 100], '100-500万': [100, 500], '>500万': [500, Infinity] };
            const [min, max] = ranges[f] || [0, Infinity];
            return c.aum >= min && c.aum < max;
          });
        });
      }
      // Apply sort
      if (sortKey) {
        const dir = sortDir === 'asc' ? 1 : -1;
        result.sort((a, b) => {
          let va = a[sortKey], vb = b[sortKey];
          if (sortKey === 'aum') { va = +va; vb = +vb; }
          if (va < vb) return -1 * dir;
          if (va > vb) return 1 * dir;
          return 0;
        });
      }
      displayed = result;
      displayedCount = 0;
      renderList(true);
    }

    function filterBySearch(list) {
      if (!searchKeyword) return list;
      return list.filter(c =>
        c.name.toLowerCase().includes(searchKeyword) ||
        c.phone.includes(searchKeyword)
      );
    }

    // ========== Filter Modal ==========
    function toggleFilterModal() {
      const overlay = document.getElementById('filterOverlay');
      const sheet = document.getElementById('filterSheet');
      const isOpen = overlay.classList.contains('show');
      if (isOpen) {
        closeFilterModal();
      } else {
        overlay.classList.add('show');
        sheet.classList.add('show');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeFilterModal() {
      document.getElementById('filterOverlay').classList.remove('show');
      document.getElementById('filterSheet').classList.remove('show');
      document.body.style.overflow = '';
    }

    function toggleFilterCheck(btn, type, value) {
      // Toggle active state on button
      const isActive = btn.classList.contains('active-check');
      if (isActive) {
        btn.classList.remove('active-check');
        btn.style.background = 'white';
        btn.style.color = '#0F172A';
        btn.style.borderColor = '#E2E8F0';
        filters[type] = filters[type].filter(v => v !== value);
      } else {
        btn.classList.add('active-check');
        btn.style.background = '#2563EB';
        btn.style.color = 'white';
        btn.style.borderColor = '#2563EB';
        filters[type].push(value);
      }
    }

    function resetFilters() {
      filters = { type: [], risk: [], category: [], asset: [], active: [] };
      document.querySelectorAll('.filter-check-btn').forEach(btn => {
        btn.classList.remove('active-check');
        btn.style.background = 'white';
        btn.style.color = '#0F172A';
        btn.style.borderColor = '#E2E8F0';
      });
    }

    function applyFilters() {
      closeFilterModal();
      renderActiveFilterTags();
      applyFiltersToList();
    }

    function renderActiveFilterTags() {
      const container = document.getElementById('activeFilterTags');
      const tags = [];
      for (const [key, values] of Object.entries(filters)) {
        values.forEach(val => {
          const labelMap = { type: '类型', risk: '风险', category: '分类', asset: '资产', active: '活跃' };
          tags.push(`<span class="active-filter-tag">${labelMap[key] || key}: ${val}<span class="close-btn" onclick="removeFilter('${key}', '${val}')">✕</span></span>`);
        });
      }
      container.innerHTML = tags.join('');
    }

    function removeFilter(key, val) {
      filters[key] = filters[key].filter(v => v !== val);
      // Sync button state
      document.querySelectorAll('.filter-check-btn').forEach(btn => {
        if (btn.textContent.trim() === val) {
          btn.classList.remove('active-check');
          btn.style.background = 'white';
          btn.style.color = '#0F172A';
          btn.style.borderColor = '#E2E8F0';
        }
      });
      renderActiveFilterTags();
      applyFiltersToList();
    }

    function applyFiltersToList() {
      let result = [...allCustomers];
      if (searchKeyword) result = filterBySearch(result);
      // Apply filters
      if (filters.type.length) result = result.filter(c => filters.type.includes(c.type));
      if (filters.risk.length) result = result.filter(c => filters.risk.includes(c.risk));
      if (filters.category.length) result = result.filter(c => filters.category.includes(c.category));
      if (filters.active.length) {
        result = result.filter(c => {
          return filters.active.some(f => {
            const map = { '近7天': 7, '近30天': 30, '近90天': 90, '90天以上': 91 };
            const threshold = map[f];
            if (f === '90天以上') return c.activeDays > threshold;
            return c.activeDays <= threshold;
          });
        });
      }
      if (filters.asset.length) {
        result = result.filter(c => {
          return filters.asset.some(f => {
            const ranges = { '<10万': [0, 10], '10-50万': [10, 50], '50-100万': [50, 100], '100-500万': [100, 500], '>500万': [500, Infinity] };
            const [min, max] = ranges[f] || [0, Infinity];
            return c.aum >= min && c.aum < max;
          });
        });
      }
      displayed = result;
      displayedCount = 0;
      renderList(true);
    }

    // ========== Render List ==========
    function renderList(reset = false) {
      const list = document.getElementById('customerList');
      if (reset) {
        list.innerHTML = '';
        displayedCount = 0;
      }
      if (displayed.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('loadMoreHint').classList.add('hidden');
        return;
      }
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('loadMoreHint').classList.remove('hidden');

      const toShow = displayed.slice(displayedCount, displayedCount + pageSize);
      toShow.forEach(c => {
        const priorityClass = c.priority === 'urgent' ? 'priority-urgent' : c.priority === 'high' ? 'priority-high' : 'priority-normal';
        const tagClass = c.priority === 'urgent' ? 'tag-red' : c.priority === 'high' ? 'tag-orange' : 'tag-gray';
        const tagText = c.priority === 'urgent' ? '🔥 紧急' : c.priority === 'high' ? '⚠️ 优先' : '○ 正常';
        const activeText = c.activeDays <= 30 ? c.activeDays + '天前' : formatDate(c.activeDays);

        const html = `
          <div class="customer-card ${priorityClass} cursor-pointer" onclick="openDetail('${c.id}')">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-[#dbeafe] flex items-center justify-center flex-shrink-0">
                <span class="font-bold text-[#2563EB] text-sm" style="font-family:'IBM Plex Sans',sans-serif">${c.name[0]}</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <span class="font-semibold text-navy text-sm">${c.name}</span>
                  <span class="tag ${tagClass}">${tagText}</span>
                  <span class="tag tag-blue text-[10px]">${c.type}</span>
                </div>
                <div class="flex items-center gap-3 text-xs text-muted">
                  <span>${c.phone}</span>
                  <span class="w-px h-3 bg-[#E2E8F0]"></span>
                  <span>AUM: <span class="font-semibold text-navy font-din">${c.aum}万</span></span>
                </div>
              </div>
              <div class="flex flex-col items-end gap-1 flex-shrink-0">
                <span class="text-xs text-muted">${activeText}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="text-muted">
                  <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>
        `;
        list.insertAdjacentHTML('beforeend', html);
      });
      displayedCount += toShow.length;
      document.getElementById('loadHintText').textContent =
        displayedCount >= displayed.length
          ? `已全部加载，共 ${displayed.length} 条`
          : '上滑加载更多';
    }

    function formatDate(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return `${d.getMonth()+1}.${d.getDate()}`;
    }

    function openDetail(id) {
      location.href = `慧展业_客户详情页.html?id=${id}`;
    }

    // ========== Infinite Scroll ==========
    window.addEventListener('scroll', function() {
      if (isLoading) return;
      const sh = document.documentElement.scrollHeight;
      const st = window.scrollY + window.innerHeight;
      if (st >= sh - 200) {
        if (displayedCount >= displayed.length) return;
        isLoading = true;
        document.getElementById('loadingSkeleton').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('loadingSkeleton').classList.add('hidden');
          renderList(false);
          isLoading = false;
        }, 600);
      }
    });

    // ========== Init ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderList(true);
    });
  </script>
</body>
</html>
