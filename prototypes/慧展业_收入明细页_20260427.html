<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#003B99","primary-container": "#1A52BF","surface": "#F7F9FC",
            "surface-container-low": "#F2F4F7","surface-container": "#ECEEF1",
            "surface-container-high": "#E6E8EB","surface-container-highest": "#E0E3E6",
            "surface-container-lowest": "#FFFFFF","on-surface": "#191C1E",
            "on-surface-variant": "#434653","outline-variant": "#C3C6D5","outline": "#737685",
            "tertiary": "#732B00","tertiary-container": "#993C00","tertiary-fixed": "#FFDBCC",
            "secondary": "#4E5D88","secondary-container": "#BFCEFF","error": "#BA1A1A",
            "error-container": "#FFDAD6","on-primary": "#FFFFFF","on-tertiary": "#FFFFFF",
            "on-tertiary-fixed": "#351000","on-error": "#FFFFFF","on-error-container": "#93000A",
            "on-secondary-container": "#485781",
          },
          borderRadius: { "DEFAULT": "0.25rem","lg": "1rem","xl": "1.5rem","full": "9999px" },
          fontFamily: { "headline": ["Manrope"],"body": ["Inter"],"label": ["Inter"] }
        }
      }
    }
  </script>
  <style>

    /* ========== B端 Motion Tokens ========== */
    :root {
      --motion-duration-short: 100ms;
      --motion-duration-medium: 200ms;
      --motion-duration-long: 350ms;
      --motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
      --motion-easing-decelerated: cubic-bezier(0, 0, 0, 1);
      --motion-easing-accelerated: cubic-bezier(0.3, 0, 1, 1);
    }

    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased">

  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-sm h-16 flex justify-between items-center px-6">
    <div class="flex items-center gap-3">
      <button class="w-9 h-9 rounded-xl bg-primary-container flex items-center justify-center cursor-pointer transition-all active:scale-95" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="font-headline font-semibold text-base text-on-surface">收入明细</span>
    </div>
    <button class="p-2 rounded-xl hover:bg-surface-container transition-colors active:scale-95">
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size:20px">filter_list</span>
    </button>
  </header>

  <main class="pt-16 pb-8 px-5 max-w-lg mx-auto space-y-5">

    <!-- 汇总 -->
    <div class="bg-gradient-to-br from-primary to-primary-container rounded-2xl p-5 text-white shadow-xl shadow-primary/20 relative overflow-hidden">
      <div class="absolute top-0 right-0 w-36 h-36 bg-white/10 rounded-full -mr-12 -mt-12 blur-3xl pointer-events-none"></div>
      <div class="relative z-10">
        <p class="text-xs font-medium uppercase tracking-widest opacity-80 mb-2">累计收入</p>
        <p class="font-headline text-4xl font-extrabold tracking-tighter leading-none mb-1">¥4,625<span class="text-xl font-semibold opacity-80 ml-1">元</span></p>
        <p class="text-sm font-medium text-white/70">共 61 笔</p>
      </div>
    </div>

    <!-- 筛选条件 -->
    <section class="space-y-4">
      <!-- Tab切换 -->
      <div class="flex gap-2 overflow-x-auto no-scrollbar">
        <button class="px-5 py-2 rounded-full bg-primary text-white font-semibold text-xs shadow-sm whitespace-nowrap active:scale-95 transition-transform" onclick="switchTab(this)">全部</button>
        <button class="px-5 py-2 rounded-full bg-surface-container text-on-surface-variant font-medium text-xs whitespace-nowrap hover:bg-surface-container-high active:scale-95 transition-all" onclick="switchTab(this)">达标</button>
        <button class="px-5 py-2 rounded-full bg-surface-container text-on-surface-variant font-medium text-xs whitespace-nowrap hover:bg-surface-container-high active:scale-95 transition-all" onclick="switchTab(this)">有效</button>
      </div>
      <!-- 日期范围 -->
      <div class="flex items-center gap-3">
        <input type="date" class="flex-1 bg-surface-container-highest border-none rounded-xl py-3 px-4 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 outline-none"/>
        <span class="text-on-surface-variant text-sm">至</span>
        <input type="date" class="flex-1 bg-surface-container-highest border-none rounded-xl py-3 px-4 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 outline-none"/>
        <button class="p-2.5 rounded-xl bg-primary text-white active:scale-95 transition-transform shadow-sm">
          <span class="material-symbols-outlined text-lg">search</span>
        </button>
      </div>
    </section>

    <!-- 记录列表 -->
    <section class="space-y-3">
      <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">收入记录</p>

      <!-- 达标记录 -->
      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-green-600 text-lg">verified</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">时尚美发沙龙</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-200">达标</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-15</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-green-600 ml-3">+¥25</span>
      </div>

      <!-- 有效记录 -->
      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-blue-600 text-lg">stars</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">海底捞火锅店</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">有效</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-14</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-blue-600 ml-3">+¥125</span>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-blue-600 text-lg">stars</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">瑞幸咖啡人民广场店</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">有效</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-13</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-blue-600 ml-3">+¥125</span>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-green-600 text-lg">verified</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">便利购超市</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-50 text-green-700 border border-green-200">达标</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-12</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-green-600 ml-3">+¥25</span>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-blue-600 text-lg">stars</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">全季酒店南京东路店</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">有效</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-11</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-blue-600 ml-3">+¥125</span>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl p-4 shadow-sm flex items-center justify-between active:scale-[0.99] transition-all cursor-pointer">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-blue-600 text-lg">stars</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-headline text-sm font-bold text-on-surface truncate">上海宾馆</p>
            <div class="flex items-center gap-2 mt-0.5">
              <span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">有效</span>
              <span class="text-[10px] text-on-surface-variant">2025-01-10</span>
            </div>
          </div>
        </div>
        <span class="font-headline text-base font-extrabold text-blue-600 ml-3">+¥125</span>
      </div>

      <!-- 加载更多 -->
      <div class="text-center py-4">
        <button class="text-xs text-primary font-semibold hover:underline active:scale-95 transition-all">加载更多记录</button>
      </div>
    </section>

  </main>

  <script>
    function switchTab(btn) {
      document.querySelectorAll('.rounded-full').forEach(b => {
        if (b.textContent.trim() === '全部' || b.textContent.trim() === '达标' || b.textContent.trim() === '有效') {
          b.classList.remove('bg-primary', 'text-white', 'shadow-sm');
          b.classList.add('bg-surface-container', 'text-on-surface-variant');
        }
      });
      btn.classList.add('bg-primary', 'text-white', 'shadow-sm');
      btn.classList.remove('bg-surface-container', 'text-on-surface-variant');
    }
  </script>
</body>
</html>
