    tailwind.init({ darkMode: 'class', theme: { extend: { colors: { primary: '#3B82F6', 'primary-container': '#2563EB', surface: '#F7F9FC', 'surface-container-low': '#F2F4F7', 'surface-container': '#ECEEF1', 'surface-container-high': '#E6E8EB', 'surface-container-highest': '#E0E3E6', 'surface-container-lowest': '#FFFFFF', 'on-surface': '#191C1E', 'on-surface-variant': '#434653', 'outline-variant': '#C3C6D5', outline: '#737685', tertiary: '#732B00', secondary: '#4E5D88', 'secondary-container': '#BFCEFF', 'on-secondary-container': '#485781', error: '#BA1A1A', 'error-container': '#FFDAD6', 'on-primary': '#FFFFFF' }, borderRadius: { DEFAULT: '0.25rem', lg: '1rem', xl: '1.5rem', full: '9999px' }, fontFamily: { headline: ['Manrope'], body: ['Inter'], label: ['Inter'] } } });
  </script>
  <style>
    :root {
      --motion-duration-short: 100ms;
      --motion-duration-medium: 200ms;
      --motion-duration-long: 350ms;
      --motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Chip 筛选器 */
    .filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      border: 1px solid var(--color-outline, #737685);
      background: var(--color-surface-container-lowest, #FFFFFF);
      color: var(--color-on-surface-variant, #434653);
      cursor: pointer;
      transition: all var(--motion-duration-short) var(--motion-easing-standard);
      white-space: nowrap;
    }
    .filter-chip:hover { background: var(--color-surface-container-high, #E6E8EB); }
    .filter-chip.selected {
      background: var(--color-primary, #3B82F6);
      color: var(--color-on-primary, #FFFFFF);
      border-color: transparent;
    }
    .filter-chip.selected:hover { background: var(--color-primary-container, #2563EB); }

    /* 加载动画 */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #ECEEF1 25%, #F7F9FC 50%, #ECEEF1 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased">

  <!-- TopAppBar -->

    <!-- 已选条件标签行 -->

    <!-- 客户列表 -->

    <!-- 加载中骨架屏 -->

        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">

        <span class="material-symbols-outlined text-on-surface-variant" style="font-size:40px">person_search</span>

  </main>

  <script>
    // ========== 模拟数据 ==========
    const allCustomers = [
      { id: 'C001', name: '张伟', phone: '138****8888', type: '基金客户', aum: 50.2, activeDays: 3, risk: '平衡型', category: '潜力客户' },
      { id: 'C002', name: '李娜', phone: '139****9999', type: '理财客户', aum: 120.5, activeDays: 15, risk: '稳健型', category: '核心客户' },
      { id: 'C003', name: '王芳', phone: '136****1234', type: '混合客户', aum: 85.0, activeDays: 7, risk: '成长型', category: '潜力客户' },
      { id: 'C004', name: '刘洋', phone: '137****5678', type: '存款客户', aum: 8.5, activeDays: 45, risk: '保守型', category: '潜在客户' },
      { id: 'C005', name: '陈静', phone: '135****2345', type: '基金客户', aum: 200.0, activeDays: 1, risk: '进取型', category: '核心客户' },
      { id: 'C006', name: '赵强', phone: '158****6789', type: '理财客户', aum: 55.8, activeDays: 22, risk: '平衡型', category: '潜力客户' },
      { id: 'C007', name: '孙丽', phone: '159****3456', type: '混合客户', aum: 150.0, activeDays: 5, risk: '稳健型', category: '核心客户' },
      { id: 'C008', name: '周涛', phone: '186****7890', type: '基金客户', aum: 32.0, activeDays: 60, risk: '平衡型', category: '休眠客户' },
      { id: 'C009', name: '吴婷', phone: '187****0123', type: '理财客户', aum: 88.0, activeDays: 10, risk: '成长型', category: '潜力客户' },
      { id: 'C010', name: '郑明', phone: '188****4567', type: '存款客户', aum: 12.0, activeDays: 95, risk: '保守型', category: '潜在客户' },
      { id: 'C011', name: '黄磊', phone: '189****8901', type: '基金客户', aum: 180.0, activeDays: 2, risk: '进取型', category: '核心客户' },
      { id: 'C012', name: '杨雪', phone: '135****5678', type: '混合客户', aum: 65.0, activeDays: 18, risk: '稳健型', category: '潜力客户' },
      { id: 'C013', name: '周勇', phone: '136****9012', type: '理财客户', aum: 42.0, activeDays: 30, risk: '平衡型', category: '潜力客户' },
      { id: 'C014', name: '吴娟', phone: '137****3456', type: '基金客户', aum: 95.0, activeDays: 8, risk: '成长型', category: '核心客户' },
      { id: 'C015', name: '徐鹏', phone: '138****7890', type: '存款客户', aum: 6.0, activeDays: 120, risk: '保守型', category: '休眠客户' },
    ];

    // ========== 状态管理 ==========
    let filteredCustomers = [...allCustomers];
    let filters = { type: [], risk: '', category: '', asset: '' };
    let pageSize = 5;
    let displayedCount = 0;

    // ========== 筛选器切换 ==========
    var activeFilterId = null;
    function toggleFilter(btn, filterId) {
      // 阻止事件冒泡，防止触发 document click 关闭
      event.stopPropagation();
      // 关闭其他筛选器
      ['typeFilter', 'riskFilter', 'categoryFilter', 'assetFilter'].forEach(id => {
        if (id !== filterId) {
          const el = document.getElementById(id);
          if (el) el.classList.add('hidden');
        }
      });
      const target = document.getElementById(filterId);
      if (target) {
        if (target.classList.contains('hidden')) {
          target.classList.remove('hidden');
          activeFilterId = filterId;
        } else {
          target.classList.add('hidden');
          activeFilterId = null;
        }
      }
      // 点击外部关闭
      setTimeout(function() {
        document.addEventListener('click', function closeFilter(e) {
          if (activeFilterId && !document.getElementById(activeFilterId).contains(e.target) && !e.target.closest('.filter-chip')) {
            document.getElementById(activeFilterId).classList.add('hidden');
            activeFilterId = null;
            document.removeEventListener('click', closeFilter);
          }
        });
      }, 10);
    }

    function applyFilter(type, input) {
      if (type === 'type') {
        // 多选：收集所有勾选的type
        const checked = [...document.querySelectorAll('#typeFilter input:checked')].map(cb => cb.value);
        filters.type = checked;
        document.getElementById('typeFilterLabel').textContent = checked.length ? `产品类型(${checked.length})` : '产品类型';
        document.querySelector('[onclick="toggleFilter(this, \'typeFilter\')"]').classList.toggle('selected', checked.length > 0);
      } else {
        filters[type] = input.value;
        const labelMap = { risk: '风险等级', category: '客户分类', asset: '资产区间' };
        document.getElementById(type + 'FilterLabel').textContent = input.value;
        document.querySelector(`[onclick="toggleFilter(this, '${type}Filter')"]`).classList.add('selected');
      }
      // 关闭下拉
      document.getElementById(type + 'Filter').classList.add('hidden');
      // 更新已选条件标签
      updateActiveFiltersRow();
      // 重新筛选
      applyFilters();
    }

    function updateActiveFiltersRow() {
      const row = document.getElementById('activeFiltersRow');
      const items = [];
      if (filters.type.length) items.push({ label: '产品类型', value: filters.type.join(','), key: 'type' });
      if (filters.category) items.push({ label: '客户分类', value: filters.category, key: 'category' });
      if (filters.risk) items.push({ label: '风险等级', value: filters.risk, key: 'risk' });
      if (filters.asset) items.push({ label: '资产区间', value: filters.asset, key: 'asset' });

      if (items.length === 0) {
        row.classList.add('hidden');
        return;
      }
      row.classList.remove('hidden');
      row.innerHTML = items.map(item => `
        <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-primary/10 text-primary text-xs rounded-full">
          <span class="font-medium">${item.label}:</span>
          <span>${item.value}</span>
          <button onclick="clearFilter('${item.key}')" class="ml-1 hover:text-primary/70">
            <span class="material-symbols-outlined" style="font-size:12px">close</span>
          </button>
        </span>
      `).join('');
    }

    function clearFilter(key) {
      if (key === 'type') {
        filters.type = [];
        document.querySelectorAll('#typeFilter input:checked').forEach(cb => cb.checked = false);
        document.getElementById('typeFilterLabel').textContent = '产品类型';
        document.querySelector('[onclick="toggleFilter(this, \'typeFilter\')"]').classList.remove('selected');
      } else {
        filters[key] = '';
        const labelMap = { risk: '风险等级', category: '客户分类', asset: '资产区间' };
        document.getElementById(key + 'FilterLabel').textContent = labelMap[key];
        document.querySelectorAll(`#${key}Filter input`).forEach(function(i) { i.checked = false; });
        document.querySelector(`[onclick="toggleFilter(this, '${key}Filter')"]`).classList.remove('selected');
      }
      updateActiveFiltersRow();
      applyFilters();
    }

    function applyFilters() {
      filteredCustomers = allCustomers.filter(c => {
        if (filters.type.length && !filters.type.includes(c.type)) return false;
        if (filters.risk && c.risk !== filters.risk) return false;
        if (filters.category && c.category !== filters.category) return false;
        if (filters.asset) {
          const ranges = { '<10万': [0, 10], '10-50万': [10, 50], '50-100万': [50, 100], '100-500万': [100, 500], '>500万': [500, Infinity] };
          const [min, max] = ranges[filters.asset] || [0, Infinity];
          if (c.aum < min || c.aum >= max) return false;
        }
        return true;
      });
      displayedCount = 0;
      renderList(true);
    }

    // ========== 渲染列表 ==========
    function renderList(reset = false) {
      const list = document.getElementById('customerList');
      if (reset) {
        list.innerHTML = '';
        displayedCount = 0;
      }

      if (filteredCustomers.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('loadMoreHint').classList.add('hidden');
        return;
      }
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('loadMoreHint').classList.remove('hidden');

      const toShow = filteredCustomers.slice(displayedCount, displayedCount + pageSize);
      toShow.forEach(c => {
        const activeText = c.activeDays <= 30 ? c.activeDays + '天前' : formatDate(c.activeDays);
        const html = `
          <div class="bg-white rounded-2xl p-4 shadow-sm cursor-pointer active:scale-[0.99] transition-transform" onclick="openCustomerDetail('${c.id}')">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
                <span class="font-headline font-bold text-primary text-sm">${c.name[0]}</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                  <span class="font-headline font-semibold text-on-surface">${c.name}</span>
                  <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-surface-container text-on-surface-variant">${c.type}</span>
                </div>
                <div class="flex items-center gap-3 text-xs text-on-surface-variant">
                  <span>${c.phone}</span>
                  <span class="w-px h-3 bg-outline-variant"></span>
                  <span>AUM: <span class="font-semibold text-on-surface">${c.aum}万</span></span>
                </div>
              </div>
              <div class="flex flex-col items-end gap-1 flex-shrink-0">
                <span class="text-xs text-on-surface-variant">${activeText}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="text-on-surface-variant">
                  <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          </div>
        `;
        list.insertAdjacentHTML('beforeend', html);
      });

      displayedCount += toShow.length;
      document.getElementById('loadHintText').textContent =
        displayedCount >= filteredCustomers.length
          ? `已全部加载，共 ${filteredCustomers.length} 条`
          : '上滑加载更多';
    }

    function formatDate(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return `${d.getMonth()+1}.${d.getDate()}`;
    }

    function openCustomerDetail(id) {
      window.open('https://akarozu.github.io/hui-zhan-ye-doc/管户客户查询/prototypes/慧展业_客户详情页.html?id=' + id, '_blank');
    }

    // ========== 滚屏加载 ==========
    let isLoading = false;
    window.addEventListener('scroll', function() {
      if (isLoading) return;
      const sh = document.documentElement.scrollHeight;
      const st = window.scrollY + window.innerHeight;
      if (st >= sh - 200) {
        if (displayedCount >= filteredCustomers.length) return;
        isLoading = true;
        document.getElementById('loadingSkeleton').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('loadingSkeleton').classList.add('hidden');
          renderList(false);
          isLoading = false;
        }, 800);
      }
    });

    // ========== Toast 提示 ==========
    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'fixed top-20 left-1/2 -translate-x-1/2 bg-on-surface text-white px-4 py-2 rounded-xl text-sm z-[200] shadow-lg';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderList(true);
    });
  </script>
</body>
</html>
