<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>管户客户查询</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2563EB', dark: '#1D4ED8', light: '#3B82F6' },
            accent: '#10B981',
            'accent-bg': '#dcfce7',
            warning: '#F59E0B',
            'warning-bg': '#fef3c7',
            error: '#EF4444',
            'error-bg': '#fee2e2',
            surface: '#FFFFFF',
            'surface-bg': '#F8FAFC',
            muted: '#64748B',
            border: '#E2E8F0',
            navy: '#0F172A',
          },
          fontFamily: {
            sans: ['IBM Plex Sans', 'Noto Sans SC', 'sans-serif'],
            mono: ['D-DIN-PRO', 'IBM Plex Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'IBM Plex Sans', 'Noto Sans SC', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 筛选 Chip */
    .filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px; font-weight: 500;
      border: 1.5px solid #E2E8F0;
      background: #FFFFFF;
      color: #64748B;
      cursor: pointer;
      white-space: nowrap;
      transition: all 150ms;
      flex-shrink: 0;
    }
    .filter-chip:hover { border-color: #2563EB; color: #2563EB; }
    .filter-chip.active {
      background: #2563EB;
      border-color: #2563EB;
      color: #FFFFFF;
    }
    .filter-chip .check-icon { display: none; }
    .filter-chip.active .check-icon { display: inline; }

    /* 卡片 */
    .customer-card {
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 4rpx 16rpx rgba(0,0,0,0.06);
      padding: 16px;
      cursor: pointer;
      transition: transform 150ms, box-shadow 150ms;
    }
    .customer-card:hover { box-shadow: 0 8rpx 24rpx rgba(0,0,0,0.10); }
    .customer-card:active { transform: scale(0.98); }

    /* 骨架屏 */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    /* Tag */
    .tag {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 999px;
    }
    .tag-blue { background: #dbeafe; color: #2563EB; }
    .tag-green { background: #dcfce7; color: #10B981; }
    .tag-orange { background: #fef3c7; color: #D97706; }
    .tag-gray { background: #f1f5f9; color: #64748B; }

    /* Toast */
    .toast {
      position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
      background: #0F172A; color: white;
      padding: 10px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      z-index: 200; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    /* 数字等宽 */
    .num { font-family: 'D-DIN-PRO', 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

      <button onclick="history.back()" class="w-9 h-9 rounded-full bg-[#2563EB] flex items-center justify-center cursor-pointer active:scale-95 transition-transform">

    <!-- 骨架屏 -->
    <div id="loadingSkeleton" class="hidden space-y-3 mt-3">
      <div class="bg-white rounded-2xl p-4" style="box-shadow:0 4rpx 16rpx rgba(0,0,0,0.06)">
        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-24 rounded"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton h-3 w-16 rounded"></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-4" style="box-shadow:0 4rpx 16rpx rgba(0,0,0,0.06)">
        <div class="flex items-center gap-3">
          <div class="skeleton w-10 h-10 rounded-full"></div>
          <div class="flex-1 space-y-2">
            <div class="skeleton h-4 w-24 rounded"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton h-3 w-16 rounded"></div>
        </div>
      </div>

    <!-- 底部加载提示 -->
    <div id="loadMoreHint" class="text-center py-6 text-sm text-muted">
      <span id="loadHintText">上滑加载更多</span>

  </main>

      { id: 'C015', name: '徐鹏',   phone: '138****7890', type: '存款客户', aum: 6.0,   activeDays: 120,risk: '保守型', category: '休眠客户' },
    ];

    // ===== 状态 =====
    var filters = { type: [], risk: '', category: '', asset: '' };
    var pageSize = 5;
    var displayedCount = 0;
    var isLoading = false;

    // ===== 筛选器面板切换 =====
    var activePanel = null;

    function toggleFilterPanel(id) {
      event.stopPropagation();
      var panels = ['typeFilter', 'riskFilter', 'categoryFilter', 'assetFilter'];
      panels.forEach(function(p) {
        var el = document.getElementById(p);
        if (el) el.classList.add('hidden');
      });
      var target = document.getElementById(id);
      if (!target) return;
      if (target.classList.contains('hidden')) {
        target.classList.remove('hidden');
        activePanel = id;
      } else {
        target.classList.add('hidden');
        activePanel = null;
      }
    }

    // 点击外部关闭
    document.addEventListener('click', function(e) {
      if (activePanel && !document.getElementById(activePanel).contains(e.target) && !e.target.closest('.filter-chip')) {
        document.getElementById(activePanel).classList.add('hidden');
        activePanel = null;
      }
    });

    // ===== 单选筛选（radio） =====
    function applySingleFilter(type, value, panelId) {
      // 记录筛选值
      filters[type] = value;
      // 关闭面板
      document.getElementById(panelId).classList.add('hidden');
      activePanel = null;
      // 更新 Chip 状态
      var chip = document.getElementById(type + 'Chip');
      var label = document.getElementById(type + 'ChipLabel');
      chip.classList.add('active');
      label.textContent = value;
      // 更新已选标签
      updateActiveFiltersRow();
      // 重新筛选
      applyFilters();
    }

    // ===== 多选筛选（checkbox） =====
    function applyChipFilter(type, panelId) {
      // 收集当前勾选项
      var checked = [].slice.call(document.querySelectorAll('#' + panelId + ' input:checked')).map(function(cb) { return cb.value; });
      filters.type = checked;
      // 更新 Chip 状态
      var chip = document.getElementById(type + 'Chip');
      var label = document.getElementById(type + 'ChipLabel');
      if (checked.length > 0) {
        chip.classList.add('active');
        label.textContent = '产品类型(' + checked.length + ')';
      } else {
        chip.classList.remove('active');
        label.textContent = '产品类型';
      }
      // 更新已选标签
      updateActiveFiltersRow();
      // 重新筛选
      applyFilters();
    }

    // ===== 清除筛选 =====
    function clearFilter(key) {
      if (key === 'type') {
        filters.type = [];
        document.querySelectorAll('#typeFilter input:checked').forEach(function(cb) { cb.checked = false; });
        document.getElementById('typeChip').classList.remove('active');
        document.getElementById('typeChipLabel').textContent = '产品类型';
      } else {
        filters[key] = '';
        document.querySelectorAll('#' + key + 'Filter input').forEach(function(i) { i.checked = false; });
        document.getElementById(key + 'Chip').classList.remove('active');
        var labelMap = { risk: '风险等级', category: '客户分类', asset: '资产区间' };
        document.getElementById(key + 'ChipLabel').textContent = labelMap[key];
      }
      updateActiveFiltersRow();
      applyFilters();
    }

    // ===== 更新已选条件行 =====
    function updateActiveFiltersRow() {
      var row = document.getElementById('activeFiltersRow');
      var items = [];
      if (filters.type.length) items.push({ label: '产品类型', value: filters.type.join(','), key: 'type' });
      if (filters.risk) items.push({ label: '风险等级', value: filters.risk, key: 'risk' });
      if (filters.category) items.push({ label: '客户分类', value: filters.category, key: 'category' });
      if (filters.asset) items.push({ label: '资产区间', value: filters.asset, key: 'asset' });

      if (items.length === 0) {
        row.classList.add('hidden');
        return;
      }
      row.classList.remove('hidden');
      row.innerHTML = items.map(function(item) {
        return '<span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-[#2563EB]/8 text-[#2563EB] text-xs font-medium rounded-full">' +
          '<span>' + item.label + ':</span>' +
          '<span>' + item.value + '</span>' +
          '<button onclick="clearFilter(\'' + item.key + '\')" class="hover:opacity-70 cursor-pointer">' +
            '<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>' +
          '</button>' +
        '</span>';
      }).join('');
    }

    // ===== 执行筛选 =====
    function applyFilters() {
      var result = allCustomers.filter(function(c) {
        if (filters.type.length && filters.type.indexOf(c.type) === -1) return false;
        if (filters.risk && c.risk !== filters.risk) return false;
        if (filters.category && c.category !== filters.category) return false;
        if (filters.asset) {
          var ranges = { '<10万': [0, 10], '10-50万': [10, 50], '50-100万': [50, 100], '100-500万': [100, 500], '>500万': [500, Infinity] };
          var range = ranges[filters.asset] || [0, Infinity];
          if (c.aum < range[0] || c.aum >= range[1]) return false;
        }
        return true;
      });
      // 直接替换列表
      window._filteredCustomers = result;
      displayedCount = 0;
      renderList(true);
    }

    // ===== 渲染列表 =====
    function renderList(reset) {
      var list = document.getElementById('customerList');
      if (reset) {
        list.innerHTML = '';
        displayedCount = 0;
      }

      var data = window._filteredCustomers || allCustomers;
      if (data.length === 0) {
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('loadMoreHint').classList.add('hidden');
        return;
      }
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('loadMoreHint').classList.remove('hidden');

      var toShow = data.slice(displayedCount, displayedCount + pageSize);
      toShow.forEach(function(c) {
        var activeText = c.activeDays <= 30 ? c.activeDays + '天前' : formatDate(c.activeDays);
        var tagClass = c.category === '核心客户' ? 'tag-green' : c.category === '潜力客户' ? 'tag-blue' : c.category === '休眠客户' ? 'tag-gray' : 'tag-orange';
        var html = '<div class="customer-card" onclick="openDetail(\'' + c.id + '\')">' +
          '<div class="flex items-center gap-3">' +
            '<div class="w-10 h-10 rounded-full bg-[#dbeafe] flex items-center justify-center flex-shrink-0">' +
              '<span class="font-semibold text-[#2563EB] text-sm">' + c.name[0] + '</span>' +
            '</div>' +
            '<div class="flex-1 min-w-0">' +
              '<div class="flex items-center gap-2 mb-0.5">' +
                '<span class="font-semibold text-[15px] text-navy">' + c.name + '</span>' +
                '<span class="tag ' + tagClass + '">' + c.category + '</span>' +
              '</div>' +
              '<div class="flex items-center gap-3 text-xs text-muted">' +
                '<span>' + c.phone + '</span>' +
                '<span class="w-px h-3 bg-[#E2E8F0]"></span>' +
                '<span>AUM: <span class="font-semibold text-navy num">' + c.aum + '万</span></span>' +
              '</div>' +
            '</div>' +
            '<div class="flex flex-col items-end gap-1 flex-shrink-0">' +
              '<span class="text-xs text-muted">' + activeText + '</span>' +
              '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '</div>' +
          '</div>' +
        '</div>';
        list.insertAdjacentHTML('beforeend', html);
      });

      displayedCount += toShow.length;
      document.getElementById('loadHintText').textContent =
        displayedCount >= data.length
          ? '已全部加载，共 ' + data.length + ' 条'
          : '上滑加载更多';
    }

    function formatDate(daysAgo) {
      var d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return (d.getMonth() + 1) + '.' + d.getDate();
    }

    function openDetail(id) {
      window.open('https://akarozu.github.io/hui-zhan-ye-doc/管户客户查询/prototypes/慧展业_客户详情页.html?id=' + id, '_blank');
    }

    // ===== 滚动加载 =====
    window.addEventListener('scroll', function() {
      if (isLoading) return;
      var sh = document.documentElement.scrollHeight;
      var st = window.scrollY + window.innerHeight;
      if (st >= sh - 200) {
        var data = window._filteredCustomers || allCustomers;
        if (displayedCount >= data.length) return;
        isLoading = true;
        document.getElementById('loadingSkeleton').classList.remove('hidden');
        setTimeout(function() {
          document.getElementById('loadingSkeleton').classList.add('hidden');
          renderList(false);
          isLoading = false;
        }, 800);
      }
    });

    // ===== Toast =====
    function toast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    // ===== 初始化 =====
    document.addEventListener('DOMContentLoaded', function() {
      window._filteredCustomers = allCustomers;
      renderList(true);
    });
  </script>
</body>
</html>
